<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ComfyUI</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link rel="stylesheet" type="text/css" href="materialdesignicons.min.css" />

    <!-- Fullscreen mode on mobile browsers -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Status bar style (eg. black or transparent) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <style>
      @media (prefers-color-scheme: dark) {
        :root {
          /* Setting it early for background during load */
          --bg-color: #202020;
          --fg-color: #ffffff;
        }
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        background-color: var(--bg-color);
        background-image: var(--bg-img);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <link rel="stylesheet" href="splash.css" />
    <link rel="manifest" href="manifest.json" />
  </head>

  <body class="litegraph grid">
    <div id="splash-loader" role="status" aria-label="Loading ComfyUI">
      <svg viewBox="0 0 520 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="comfy-mask-splash">
            <text
              x="260" y="58"
              text-anchor="middle"
              font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
              font-size="60"
              font-weight="800"
              letter-spacing="6"
              fill="white"
            >COMFYLITE</text>
          </mask>
        </defs>
        <text
          x="260" y="58"
          text-anchor="middle"
          font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="60"
          font-weight="800"
          letter-spacing="6"
          stroke="currentColor"
          stroke-width="1"
          fill="none"
          opacity="0.3"
        >COMFYLITE</text>
        <g mask="url(#comfy-mask-splash)">
          <g class="wave-group">
            <path
              class="wave-path"
              d="M 0 25 Q 65 0 130 25 T 260 25 T 390 25 T 520 25 T 650 25 T 780 25 T 910 25 T 1040 25 V 200 H 0 Z"
              fill="currentColor"
            />
          </g>
        </g>
      </svg>
    </div>
    <script>
      ;(function () {
        var bg, fg
        try {
          bg = localStorage.getItem('comfy-splash-bg')
          fg = localStorage.getItem('comfy-splash-fg')
        } catch (_) {}
        if (!bg || !fg) {
          var isDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          bg = isDark ? '#202020' : '#f5f5f5'
          fg = isDark ? '#ffffff' : '#000000'
        }
        document.documentElement.style.setProperty('--bg-color', bg)
        document.documentElement.style.setProperty('--fg-color', fg)
        var el = document.getElementById('splash-loader')
        if (el) {
          el.style.background = bg
          el.style.color = fg
        }
      })()
    </script>
    <div id="vue-app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
