<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI Lite</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .drag-handle {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 38px;
      background: #252525;
      -webkit-app-region: drag;
      z-index: 10;
    }

    /* ─── Error Screen ─── */
    .error-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a1e;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 12px;
    }
    .error-screen.active { display: flex; }
    .error-screen .error-msg {
      font-size: 20px;
      color: #ccc;
      margin-top: 16px;
    }
    .error-screen .error-version {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .error-actions button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #333;
      background: transparent;
      color: #ccc;
    }
    .error-actions button:hover {
      background: #2a2a2e;
      border-color: #444;
    }
    .error-actions button.primary {
      background: #007AFF;
      border-color: #007AFF;
      color: #fff;
    }
    .error-actions button.primary:hover {
      background: #0066d6;
    }
    .error-actions button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .error-actions button svg {
      width: 14px;
      height: 14px;
    }

    /* ─── Screens ─── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      transition: opacity 0.4s ease;
    }
    .screen.active { display: flex; }
    .screen.fade-out { opacity: 0; pointer-events: none; }

    /* ═══════════════════ Welcome Screen ═══════════════════ */
    #welcome-screen {
      background: #1a1a1e;
    }

    .welcome-logo {
      width: 320px;
      height: auto;
      margin-bottom: 48px;
      filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.3));
    }

    .get-started-btn {
      background: #2A2AE0;
      border: none;
      border-radius: 8px;
      padding: 14px 48px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .get-started-btn:hover {
      background: #3535F0;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(42, 42, 224, 0.4);
    }

    /* ═══════════════════ Setup Screen ═══════════════════ */
    #setup-screen {
      justify-content: flex-start;
      padding-top: 80px;
    }

    .setup-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .setup-desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
      text-align: center;
      max-width: 480px;
    }

    .path-section {
      width: 100%;
      max-width: 560px;
    }

    .path-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .path-input {
      flex: 1;
      background: #252528;
      border: 1px solid #3a3a3d;
      border-radius: 10px;
      padding: 14px 16px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: 'SF Mono', 'Menlo', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .path-input:focus { border-color: #007AFF; }

    .browse-btn {
      background: #252528;
      border: 1px solid #3a3a3d;
      border-radius: 10px;
      padding: 14px 16px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }

    .browse-btn:hover {
      background: #303033;
      border-color: #007AFF;
      color: #007AFF;
    }

    .path-warning {
      font-size: 12px;
      color: #d4a017;
      padding: 8px 12px;
      background: rgba(212, 160, 23, 0.1);
      border-radius: 6px;
      margin-bottom: 8px;
      display: none;
    }
    .path-warning.visible { display: block; }

    .setup-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-top: 1px solid #2a2a2d;
    }

    .back-btn {
      background: #252528;
      border: 1px solid #3a3a3d;
      border-radius: 8px;
      padding: 10px 24px;
      color: #ccc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: #303033; border-color: #444; }

    .install-btn {
      background: #2A2AE0;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .install-btn:hover {
      background: #3535F0;
    }

    .install-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ═══════════════════ Log Overlay ═══════════════════ */
    #log-overlay {
      position: fixed;
      inset: 0;
      background: #1a1a1e;
      display: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #log-overlay.visible {
      display: block;
      opacity: 1;
    }

    /* Background scrolling log */
    .log-bg {
      position: absolute;
      inset: 0;
      padding: 20px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.25);
      word-break: break-all;
    }

    .log-bg::-webkit-scrollbar { width: 0; }

    .log-line { margin-bottom: 1px; }
    .log-line.cmd { color: rgba(0, 122, 255, 0.4); }
    .log-line.success { color: rgba(48, 209, 88, 0.5); }
    .log-line.error { color: rgba(255, 69, 58, 0.5); }
    .log-line.info { color: rgba(90, 200, 250, 0.35); }

    /* Center overlay content */
    .log-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(26, 26, 30, 0.85) 0%, rgba(26, 26, 30, 0.4) 70%, transparent 100%);
    }

    .log-center-logo {
      width: 280px;
      height: auto;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 40px rgba(0, 122, 255, 0.4));
    }

    .progress-bar {
      width: 240px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #007AFF, #5AC8FA);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-fill.indeterminate {
      width: 30%;
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(900%); }
    }

    .log-title {
      font-size: 20px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 8px;
    }

    .log-status {
      font-size: 14px;
      color: #007AFF;
    }
  </style>
</head>

  <!-- ════ Screen 2: Path Selection ════ -->
  <div id="setup-screen" class="screen">
    <div class="setup-title">选择安装路径</div>
    <div class="setup-desc">选择 ComfyUI Lite 的安装位置，Python 环境将自动配置在此目录中。</div>

    <div class="path-section">
      <div class="path-row">
        <input type="text" class="path-input" id="path-input" value="~/Documents/ComfyUILite" placeholder="输入安装路径">
        <button class="browse-btn" id="browse-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
      </div>
      <div class="path-warning" id="path-warning">该目录已存在 — 请确保已备份重要数据</div>
    </div>

    <div class="setup-bottom">
      <button class="back-btn" id="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <button class="install-btn" id="install-btn">安装</button>
    </div>
  </div>

  <!-- ════ Screen 3: Log Overlay ════ -->
  <div id="log-overlay">
    <!-- Background: scrolling log text -->
    <div class="log-bg" id="log-container"></div>
    <!-- Center: logo + progress + status -->

    </svg>
    <div class="error-msg">无法启动 ComfyUI Lite</div>
    <div class="error-version">v1.0.0</div>
    <div class="error-actions">
      <button id="error-logs-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        查看日志
      </button>
      <button id="error-reinstall-btn" class="primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        修复环境
      </button>
    </div>
  </div>

  <script>
    const api = window.desktopAPI;
    const errorScreen = document.getElementById('error-screen');
    const errorLogsBtn = document.getElementById('error-logs-btn');
    const errorReinstallBtn = document.getElementById('error-reinstall-btn');

    const welcomeScreen = document.getElementById('welcome-screen');
    const setupScreen = document.getElementById('setup-screen');
    const getStartedBtn = document.getElementById('get-started-btn');
    const pathInput = document.getElementById('path-input');
    const browseBtn = document.getElementById('browse-btn');
    const installBtn = document.getElementById('install-btn');
    const backBtn = document.getElementById('back-btn');
    const pathWarning = document.getElementById('path-warning');
    const logOverlay = document.getElementById('log-overlay');
    const logContainer = document.getElementById('log-container');
    const logStatus = document.getElementById('log-status');
    const logTitle = document.getElementById('log-title');
    const progressFill = document.getElementById('progress-fill');

    // ─── Init: load state ───
    if (api) {
      api.getState().then(state => {
        if (state && state.basePath) pathInput.value = state.basePath;
        if (state && state.installed) {
          // Already installed → skip all screens, auto-start
          welcomeScreen.classList.remove('active');
          showLogOverlay();
          api.startServer();
        }
      }).catch(() => {});
    }

    // ─── Welcome → Setup ───
    getStartedBtn.addEventListener('click', () => {
      welcomeScreen.classList.add('fade-out');
      setTimeout(() => {
        welcomeScreen.classList.remove('active', 'fade-out');
        setupScreen.classList.add('active');
      }, 400);
    });

    // ─── Back: Setup → Welcome ───
    backBtn.addEventListener('click', () => {
      setupScreen.classList.add('fade-out');
      setTimeout(() => {
        setupScreen.classList.remove('active', 'fade-out');
        welcomeScreen.classList.add('active');
      }, 400);
    });

    // ─── Path Warning ───
    pathInput.addEventListener('input', () => {
      // Check via IPC if dir exists
      if (api) {
        api.checkPath(pathInput.value).then(exists => {
          pathWarning.classList.toggle('visible', exists);
        }).catch(() => {});
      }
    });

    // ─── Browse ───
    browseBtn.addEventListener('click', async () => {
      if (!api) return;
      const dir = await api.selectDirectory();
      if (dir) pathInput.value = dir;
    });

    // ─── Install / Start ───
    installBtn.addEventListener('click', async () => {
      if (!api) return;
      installBtn.disabled = true;
      showLogOverlay();

      const state = await api.getState();
      if (state && state.installed) {
        await api.startServer();
      } else {
        await api.startInstall(pathInput.value);
      }
    });

    function showLogOverlay() {
      setupScreen.classList.add('fade-out');
      logOverlay.style.display = 'block';
      requestAnimationFrame(() => logOverlay.classList.add('visible'));
    }

    // ─── Log Messages ───
    if (api) {
      api.onLog(msg => {
        const line = document.createElement('div');
        line.className = 'log-line';
        if (msg.startsWith('$')) line.className += ' cmd';
        else if (msg.includes('✅') || msg.includes('🎉')) line.className += ' success';
        else if (msg.includes('❌')) line.className += ' error';
        else if (msg.startsWith('+') || msg.includes('Downloading')) line.className += ' info';
        line.textContent = msg;
        logContainer.appendChild(line);
        logContainer.scrollTop = logContainer.scrollHeight;
      });

      api.onStatus(status => {
        const STATUS_MAP = {
          'creating-venv': '创建环境...',
          'installing-requirements': '安装依赖...',
          'installed': '安装完成',
          'starting': '启动服务...',
          'running': '运行中',
          'stopped': '已停止',
        };
        const PROGRESS_MAP = {
          'creating-venv': 15,
          'installing-requirements': 50,
          'installed': 80,
          'running': 100,
        };
        const TITLE_MAP = {
          'creating-venv': '安装 ComfyUI',
          'installing-requirements': '安装 ComfyUI',
          'installed': '安装完成',
          'starting': '启动 ComfyUI',
          'running': '启动 ComfyUI',
          'stopped': '环境异常',
        };
        logStatus.textContent = STATUS_MAP[status] || status;
        if (logTitle) logTitle.textContent = TITLE_MAP[status] || '启动 ComfyUI';
        if (status === 'starting') {
          progressFill.classList.add('indeterminate');
          progressFill.style.width = '';
        } else {
          const pct = PROGRESS_MAP[status];
          if (pct !== undefined) {
            progressFill.classList.remove('indeterminate');
            progressFill.style.width = pct + '%';
          }
        }
        // Show error screen when server stops unexpectedly
        if (status === 'stopped') {
          errorScreen.classList.add('active');
        } else {
          errorScreen.classList.remove('active');
        }
      });
    }

    // ─── Error Screen Buttons ───
    if (api) {
      // View logs — open log file in Finder
      errorLogsBtn.addEventListener('click', () => {
        api.openLogFile();
      });

      // Reinstall — hide error screen, show log overlay, trigger repair
      errorReinstallBtn.addEventListener('click', async () => {
        errorReinstallBtn.disabled = true;
        errorScreen.classList.remove('active');
        logOverlay.style.display = 'block';
        logOverlay.classList.add('visible');
        progressFill.classList.add('indeterminate');
        progressFill.style.width = '';
        logTitle.textContent = '修复环境';
        logStatus.textContent = '正在重新安装...';
        await api.repairEnvironment();
        errorReinstallBtn.disabled = false;
      });
    }
  </script>
